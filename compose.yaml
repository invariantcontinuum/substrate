name: substrate

# Single compose file for both local dev and prod. Ports are published on
# the host identically in either mode — in prod, the home-stack
# nginx-proxy-manager reaches them via host.docker.internal and terminates
# TLS upstream (see home-stack/services/nginx-proxy-manager/init-proxy-hosts.sh).
# Mode switching: `make up` reads .env.local; `make up MODE=prod` reads
# .env.prod. The active file is passed via --env-file and ENV_FILE.

networks:
  substrate_internal:
    driver: bridge
  local-infra-network:
    external: true

volumes:
  pg_data:
  kc_data:
  pgadmin_data:

services:

  postgres:
    build: ops/infra/postgres
    container_name: substrate-postgres
    env_file: ["${ENV_FILE:-.env.local}"]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
    # AGE Cypher's parallel workers exceed Docker's default 64 MiB
    # shm under edge-heavy queries, which trips the workers' shared-
    # memory allocator and cycles the container. 1 GiB is the AGE
    # upstream recommendation for graph workloads.
    shm_size: '1g'
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./ops/infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: substrate-keycloak
    command: ["${KC_START_COMMAND}", "--import-realm"]
    env_file: ["${ENV_FILE:-.env.local}"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED}
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # Single-replica deployment: use Infinispan local cache instead of
      # distributed clustering. Silences JGRP000015 UDP buffer-size
      # warnings that fire on every startup because the Linux kernel's
      # default rmem_max/wmem_max are below JGroups' multicast defaults.
      KC_CACHE: local
    ports: ["8080:8080"]
    volumes:
      - kc_data:/opt/keycloak/data
      - ./ops/infra/keycloak/substrate-realm.json:/opt/keycloak/data/import/substrate-realm.json:ro
      - ./ops/infra/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -c 15 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: substrate-pgadmin
    env_file: ["${ENV_FILE:-.env.local}"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports: ["5050:80"]
    entrypoint: /custom-entrypoint.sh
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./ops/infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./ops/infra/pgadmin/entrypoint.sh:/custom-entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [substrate_internal, local-infra-network]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: substrate-gateway
    env_file: ["${ENV_FILE:-.env.local}"]
    environment:
      SERVICE_NAME: gateway
      GRAPH_SERVICE_URL: http://graph:8082
      INGESTION_SERVICE_URL: http://ingestion:8081
      KEYCLOAK_URL: http://keycloak:8080
      DATABASE_URL: postgresql+asyncpg://${GRAPH_DB_USER}:${GRAPH_DB_PASSWORD}@postgres:5432/${GRAPH_DB_NAME}
      APP_PORT: "8080"
    ports: ["8180:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_started }
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: substrate-ingestion
    env_file: ["${ENV_FILE:-.env.local}"]
    environment:
      SERVICE_NAME: ingestion
      DATABASE_URL: postgresql+asyncpg://${GRAPH_DB_USER}:${GRAPH_DB_PASSWORD}@postgres:5432/${GRAPH_DB_NAME}
      APP_PORT: "8081"
    ports: ["8181:8081"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  graph:
    build:
      context: .
      dockerfile: services/graph/Dockerfile
    container_name: substrate-graph
    env_file: ["${ENV_FILE:-.env.local}"]
    environment:
      SERVICE_NAME: graph
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${GRAPH_DB_NAME}
      FLYWAY_USER: ${GRAPH_DB_USER}
      FLYWAY_PASSWORD: ${GRAPH_DB_PASSWORD}
      DATABASE_URL: postgresql+asyncpg://${GRAPH_DB_USER}:${GRAPH_DB_PASSWORD}@postgres:5432/${GRAPH_DB_NAME}
      # Discrete connection knobs surfaced via Settings → Postgres
      # (PG_PASSWORD intentionally never logged). The graph service
      # composes its DSN from these at startup; DATABASE_URL above is
      # retained as a fallback for one-shot Flyway migrations.
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: ${GRAPH_DB_NAME}
      PG_USER: ${GRAPH_DB_USER}
      PG_PASSWORD: ${GRAPH_DB_PASSWORD}
      APP_PORT: "8082"
    ports: ["8182:8082"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: "substrate-frontend"
    container_name: substrate-frontend
    ports: ["3535:3000"]
    depends_on:
      gateway: { condition: service_started }
    networks: [substrate_internal]
    restart: unless-stopped

  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    container_name: substrate-docs
    ports: ["8190:80"]
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
