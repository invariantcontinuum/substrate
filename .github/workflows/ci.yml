name: ci

on:
  push:
    branches:
      - main
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  versioning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repo version alignment
        run: python3 scripts/check-version-alignment.py

      - name: Validate release branch naming
        if: startsWith(github.ref_name, 'v')
        run: |
          eval "$(bash scripts/resolve-version.sh "${GITHUB_REF_NAME}")"
          if [ "$IS_RELEASE" != "true" ]; then
            echo "release refs must use vX.Y.Z" >&2
            exit 1
          fi
          if [ "$VERSION" != "$BASE_VERSION" ]; then
            echo "release branch ${REF_NAME} must match package.json version ${BASE_VERSION}" >&2
            exit 1
          fi

  compose-config:
    runs-on: ubuntu-latest
    needs: versioning
    steps:
      - uses: actions/checkout@v4

      - name: Materialize env files from committed templates
        run: |
          cp .env.local.example .env.local
          cp .env.prod.example .env.prod

      - name: Validate local compose config
        run: ENV_FILE=.env.local docker compose --env-file .env.local -f compose.yaml config >/dev/null

      - name: Validate prod compose config
        run: ENV_FILE=.env.prod docker compose --env-file .env.prod -f compose.yaml config >/dev/null

  # Per-service Python tests with coverage. Each service runs in its own
  # job so failures are isolated and the matrix shows which one tripped.
  # Coverage XML is uploaded per service so SonarCloud can ingest it.
  python-tests:
    runs-on: ubuntu-latest
    needs: versioning
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            path: services/gateway
            extra: --extra dev
          - name: ingestion
            path: services/ingestion
            extra: --extra dev
          - name: graph
            path: services/graph
            extra: --extra dev
          - name: substrate-common
            path: packages/substrate-common
            extra: --extra dev
          - name: substrate-graph-builder
            path: packages/substrate-graph-builder
            extra: --with pytest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Sync workspace dependencies
        run: uv sync --frozen --dev

      - name: Tests with coverage — ${{ matrix.name }}
        run: |
          cd ${{ matrix.path }}
          uv run ${{ matrix.extra }} --with pytest-cov \
            pytest tests \
              --cov=src \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing

      - name: Upload coverage — ${{ matrix.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: ${{ matrix.path }}/coverage.xml
          if-no-files-found: warn
          retention-days: 7

  frontend-tests:
    runs-on: ubuntu-latest
    needs: versioning
    env:
      VITE_KEYCLOAK_URL: https://auth.example.invalid
      VITE_KEYCLOAK_REALM: substrate
      VITE_KEYCLOAK_CLIENT_ID: substrate-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: cd apps/frontend && pnpm exec tsc -b --noEmit

      - name: Full vitest with coverage
        run: |
          cd apps/frontend
          pnpm add -D @vitest/coverage-v8
          pnpm exec vitest run --coverage --coverage.reporter=lcov --coverage.reporter=text-summary

      - name: Production build
        run: cd apps/frontend && pnpm build

      - name: Upload coverage — frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: apps/frontend/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 7

  docs-build:
    runs-on: ubuntu-latest
    needs: versioning
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs toolchain
        run: pip install --no-cache-dir mkdocs mkdocs-material mkdocs-minify-plugin

      - name: Build docs site
        run: |
          cp docs/mkdocs.yml mkdocs.ci.yml
          mkdocs build -f mkdocs.ci.yml
