## SonarCloud project configuration
##
## Repo flip-to-public is a user-side prerequisite (free SonarCloud tier
## is public-only). After flipping, create the project at sonarcloud.io
## under organization `invariantcontinuum`, then add the SONAR_TOKEN
## secret to GitHub Actions; the workflow at
## .github/workflows/sonarcloud.yml will start producing analyses on
## every main-branch push.

sonar.organization=invariantcontinuum
sonar.projectKey=invariantcontinuum_substrate
sonar.projectName=Substrate
sonar.projectVersion=0.1.0

# Source layout — multi-module monorepo. Each module declares its own
# sources/tests; SonarCloud aggregates the per-module reports.
sonar.modules=services-graph,services-gateway,services-ingestion,packages-substrate-common,packages-substrate-web-common,packages-substrate-graph-builder,apps-frontend

# Service / package paths
services-graph.sonar.projectBaseDir=services/graph
services-graph.sonar.sources=src
services-graph.sonar.tests=tests
services-graph.sonar.python.version=3.12
services-graph.sonar.python.coverage.reportPaths=coverage.xml

services-gateway.sonar.projectBaseDir=services/gateway
services-gateway.sonar.sources=src
services-gateway.sonar.tests=tests
services-gateway.sonar.python.version=3.12
services-gateway.sonar.python.coverage.reportPaths=coverage.xml

services-ingestion.sonar.projectBaseDir=services/ingestion
services-ingestion.sonar.sources=src
services-ingestion.sonar.tests=tests
services-ingestion.sonar.python.version=3.12
services-ingestion.sonar.python.coverage.reportPaths=coverage.xml

packages-substrate-common.sonar.projectBaseDir=packages/substrate-common
packages-substrate-common.sonar.sources=src
packages-substrate-common.sonar.tests=tests
packages-substrate-common.sonar.python.version=3.12

packages-substrate-web-common.sonar.projectBaseDir=packages/substrate-web-common
packages-substrate-web-common.sonar.sources=src

packages-substrate-graph-builder.sonar.projectBaseDir=packages/substrate-graph-builder
packages-substrate-graph-builder.sonar.sources=src
packages-substrate-graph-builder.sonar.python.version=3.12

apps-frontend.sonar.projectBaseDir=apps/frontend
apps-frontend.sonar.sources=src
apps-frontend.sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/test-setup.ts,**/dist/**,**/node_modules/**
apps-frontend.sonar.tests=src
apps-frontend.sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
apps-frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Workspace-wide exclusions
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.uv-cache/**,**/migrations/**

# Coverage exclusions — generated SQL, schemas, and module __init__ files
# don't carry meaningful coverage signal.
sonar.coverage.exclusions=**/__init__.py,**/schemas/**,**/migrations/**,**/test_*.py
