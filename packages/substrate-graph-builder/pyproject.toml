[project]
name = "substrate-graph-builder"
version = "0.1.0"
description = "Language-parsing plugin registry emitting substrate graph documents from a materialized filesystem tree."
requires-python = ">=3.12"
dependencies = [
    "tree-sitter>=0.25",
    "tree-sitter-language-pack>=0.7",
    "structlog>=24.0",
    "substrate-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/substrate_graph_builder"]

[tool.uv.sources]
substrate-common = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "BLE", "S110", "RUF"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # pytest uses bare assert

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = [
    "^tests/fixtures/",  # grammar-parseable source corpus, not type-checked code
    "^scripts/",         # one-shot ops scripts; not part of library surface
]

[[tool.mypy.overrides]]
module = ["tree_sitter.*", "tree_sitter_language_pack.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_untyped_calls = false
