name: substrate

networks:
  substrate_internal:
    driver: bridge

volumes:
  pg_data:
  kc_data:
  pgadmin_data:

services:

  postgres:
    build: ../infra/postgres
    container_name: substrate-postgres
    env_file: [../../env/infra.env]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      GRAPH_DB_USER: ${GRAPH_DB_USER}
      GRAPH_DB_PASSWORD: ${GRAPH_DB_PASSWORD}
      GRAPH_DB_NAME: ${GRAPH_DB_NAME}
      KC_DB_USER: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_DB_NAME: ${KC_DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: substrate-keycloak
    command: ["${KC_START_COMMAND}", "--import-realm"]
    env_file: [../../env/infra.env]
    environment:
      GITHUB_OAUTH_APP_CLIENT_ID: ${GITHUB_OAUTH_APP_CLIENT_ID}
      GITHUB_OAUTH_APP_CLIENT_SECRET: ${GITHUB_OAUTH_APP_CLIENT_SECRET}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED}
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - kc_data:/opt/keycloak/data
      - ../infra/keycloak/substrate-realm.json:/opt/keycloak/data/import/substrate-realm.json:ro
      - ../infra/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -c 15 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    container_name: substrate-gateway
    env_file: [../../env/platform.env, ../../env/infra.env, ../../env/llm.env]
    environment:
      SERVICE_NAME: gateway
      GRAPH_SERVICE_URL: http://graph:8082
      INGESTION_SERVICE_URL: http://ingestion:8081
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KC_GATEWAY_CLIENT_SECRET: ${KC_GATEWAY_CLIENT_SECRET}
      AUTH_DISABLED: ${AUTH_DISABLED}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: postgresql+asyncpg://${GRAPH_DB_USER}:${GRAPH_DB_PASSWORD}@postgres:5432/${GRAPH_DB_NAME}
      APP_PORT: "8080"
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_started }
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ingestion:
    build:
      context: ../..
      dockerfile: services/ingestion/Dockerfile
    container_name: substrate-ingestion
    env_file: [../../env/platform.env, ../../env/infra.env, ../../env/llm.env]
    environment:
      SERVICE_NAME: ingestion
      DATABASE_URL: postgresql+asyncpg://${GRAPH_DB_USER}:${GRAPH_DB_PASSWORD}@postgres:5432/${GRAPH_DB_NAME}
      EMBEDDING_URL: ${EMBEDDING_URL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      LLM_API_KEY: ${LLM_API_KEY}
      APP_PORT: "8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  graph:
    build:
      context: ../..
      dockerfile: services/graph/Dockerfile
    container_name: substrate-graph
    env_file: [../../env/platform.env, ../../env/infra.env, ../../env/llm.env]
    environment:
      SERVICE_NAME: graph
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${GRAPH_DB_NAME}
      FLYWAY_USER: ${GRAPH_DB_USER}
      FLYWAY_PASSWORD: ${GRAPH_DB_PASSWORD}
      DATABASE_URL: postgresql+asyncpg://${GRAPH_DB_USER}:${GRAPH_DB_PASSWORD}@postgres:5432/${GRAPH_DB_NAME}
      EMBEDDING_URL: ${EMBEDDING_URL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      DENSE_LLM_URL: ${DENSE_LLM_URL}
      DENSE_LLM_MODEL: ${DENSE_LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      APP_PORT: "8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [substrate_internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      args:
        GITHUB_TOKEN: ""
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: "substrate-frontend"
    container_name: substrate-frontend
    depends_on:
      gateway: { condition: service_started }
    networks: [substrate_internal]
    restart: unless-stopped
