# Prod override — bundles Traefik to terminate TLS for app.<domain> and
# auth.<domain>, obtaining certs from Let's Encrypt. No application
# service is published on the host directly; every ingress flows through
# Traefik. pgadmin and debug ports are intentionally absent.
#
# Requires the env materialized by `scripts/set-env.sh prod --domain=...`:
#   ROOT_DOMAIN, APP_SUBDOMAIN, AUTH_SUBDOMAIN, ACME_EMAIL.

volumes:
  traefik_acme:

services:

  traefik:
    image: traefik:v3.2
    container_name: substrate-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=substrate_substrate_internal"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
    networks: [substrate_internal]
    restart: unless-stopped

  keycloak:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${AUTH_SUBDOMAIN}.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=le"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  frontend:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${APP_SUBDOMAIN}.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
